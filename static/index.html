<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderMate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="wandermate()" x-cloak>

    <!-- Navbar -->
    <nav class="gradient-bg text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" @click="page='home'">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-xl font-bold">WanderMate</span>
            </div>

            <div class="flex items-center gap-4">
                <!-- Dil gostergesi -->
                <div class="relative" x-data="{ langOpen: false }">
                    <button @click="langOpen = !langOpen" class="flex items-center gap-1 bg-white/20 rounded-lg px-2 py-1 text-xs hover:bg-white/30">
                        <span x-text="getLangFlag()"></span>
                        <span x-text="getLangName()" class="hidden sm:inline"></span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div x-show="langOpen" @click.away="langOpen=false" x-transition class="absolute right-0 mt-2 bg-white rounded-xl shadow-xl overflow-hidden z-50 min-w-[200px]">
                        <div class="px-3 py-2 bg-purple-50 text-xs font-bold text-purple-600 uppercase">Turk Lehceleri</div>
                        <template x-for="(data, code) in turkLehceleri" :key="code">
                            <button @click="setLang(code); langOpen=false" class="w-full px-4 py-2 text-left text-sm text-gray-700 hover:bg-purple-50 flex items-center gap-2"
                                :class="lang === code ? 'bg-purple-50 font-bold' : ''">
                                <span x-text="data.flag"></span>
                                <span x-text="data.name"></span>
                            </button>
                        </template>
                        <div class="px-3 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase border-t">Diger</div>
                        <template x-for="(data, code) in digerDiller" :key="code">
                            <button @click="setLang(code); langOpen=false" class="w-full px-4 py-2 text-left text-sm text-gray-700 hover:bg-purple-50 flex items-center gap-2"
                                :class="lang === code ? 'bg-purple-50 font-bold' : ''">
                                <span x-text="data.flag"></span>
                                <span x-text="data.name"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Giris yapmis -->
                <template x-if="user">
                    <div class="flex items-center gap-4">
                        <button @click="page='explore'" class="hover:text-purple-200 text-sm font-medium"
                            :class="page==='explore' || page==='explore-country' || page==='explore-city' ? 'text-white underline' : ''" x-text="t('explore')"></button>
                        <button @click="page='trips'" class="hover:text-purple-200 text-sm font-medium"
                            :class="page==='trips' ? 'text-white underline' : ''" x-text="t('trips')"></button>
                        <button @click="page='messages'" class="hover:text-purple-200 text-sm font-medium relative"
                            :class="page==='messages' ? 'text-white underline' : ''">
                            <span x-text="t('messages')"></span>
                            <span x-show="unreadTotal > 0" class="absolute -top-1 -right-3 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center" x-text="unreadTotal"></span>
                        </button>
                        <button @click="page='profile'" class="hover:text-purple-200 text-sm font-medium"
                            :class="page==='profile' ? 'text-white underline' : ''" x-text="t('profile')"></button>
                        <div class="flex items-center gap-2 ml-2 bg-white/20 rounded-full px-3 py-1">
                            <div class="w-7 h-7 rounded-full bg-white/30 flex items-center justify-center text-sm font-bold" x-text="user.full_name[0]"></div>
                            <span class="text-sm" x-text="user.full_name.split(' ')[0]"></span>
                        </div>
                        <button @click="logout()" class="text-sm hover:text-red-200" x-text="t('logout')"></button>
                    </div>
                </template>

                <!-- Giris yapmamis -->
                <template x-if="!user">
                    <div class="flex items-center gap-3">
                        <button @click="page='explore'" class="hover:text-purple-200 text-sm font-medium"
                            :class="page==='explore' || page==='explore-country' || page==='explore-city' ? 'text-white underline' : ''" x-text="t('explore')"></button>
                        <button @click="page='login'" class="px-4 py-1.5 rounded-lg bg-white/20 hover:bg-white/30 text-sm font-medium" x-text="t('login')"></button>
                        <button @click="page='register'" class="px-4 py-1.5 rounded-lg bg-white text-purple-700 hover:bg-purple-50 text-sm font-bold" x-text="t('register')"></button>
                    </div>
                </template>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-6">

        <!-- TOAST -->
        <div x-show="toast" x-transition class="fixed top-20 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl z-50" x-text="toastMsg"></div>

        <!-- ========== ANASAYFA ========== -->
        <template x-if="page === 'home'">
            <div>
                <div class="text-center py-16">
                    <h1 class="text-5xl font-bold text-gray-800 mb-4"><span x-text="t('hero_title_1')"></span> <span class="text-purple-600" x-text="t('hero_title_2')"></span></h1>
                    <p class="text-xl text-gray-500 mb-8 max-w-2xl mx-auto" x-text="t('hero_desc')"></p>
                    <div class="flex gap-4 justify-center">
                        <button @click="user ? page='create-trip' : page='register'" class="px-8 py-3 gradient-bg text-white rounded-xl font-bold text-lg hover:opacity-90 shadow-lg" x-text="t('plan_trip')"></button>
                        <button @click="page='trips'" class="px-8 py-3 bg-white text-purple-600 border-2 border-purple-600 rounded-xl font-bold text-lg hover:bg-purple-50" x-text="t('see_trips')"></button>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-8 py-12">
                    <div class="text-center p-6 bg-white rounded-2xl shadow-sm card-hover">
                        <div class="w-16 h-16 mx-auto mb-4 gradient-bg rounded-2xl flex items-center justify-center">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2" x-text="t('step1_title')"></h3>
                        <p class="text-gray-500" x-text="t('step1_desc')"></p>
                    </div>
                    <div class="text-center p-6 bg-white rounded-2xl shadow-sm card-hover">
                        <div class="w-16 h-16 mx-auto mb-4 bg-green-500 rounded-2xl flex items-center justify-center">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2" x-text="t('step2_title')"></h3>
                        <p class="text-gray-500" x-text="t('step2_desc')"></p>
                    </div>
                    <div class="text-center p-6 bg-white rounded-2xl shadow-sm card-hover">
                        <div class="w-16 h-16 mx-auto mb-4 bg-orange-500 rounded-2xl flex items-center justify-center">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2" x-text="t('step3_title')"></h3>
                        <p class="text-gray-500" x-text="t('step3_desc')"></p>
                    </div>
                </div>

                <div class="py-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6" x-text="t('open_trips')"></h2>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" x-show="homeTrips.length">
                        <template x-for="trip in homeTrips" :key="trip.id">
                            <div class="bg-white p-5 rounded-xl shadow-sm card-hover cursor-pointer" @click="viewTrip(trip.id)">
                                <div class="flex items-center gap-2 mb-3">
                                    <div class="w-10 h-10 rounded-full gradient-bg flex items-center justify-center text-white font-bold" x-text="trip.traveler_name[0] || '?'"></div>
                                    <div>
                                        <div class="font-medium text-gray-800" x-text="trip.traveler_name"></div>
                                        <div class="text-xs text-gray-400" x-text="trip.traveler_country"></div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1 text-purple-600 font-bold mb-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
                                    <span x-text="trip.destination_city + ', ' + trip.destination_country"></span>
                                </div>
                                <div class="text-sm text-gray-500 mb-2" x-text="formatDate(trip.arrival_date) + ' → ' + formatDate(trip.departure_date)"></div>
                                <p class="text-sm text-gray-600 line-clamp-2" x-text="trip.description"></p>
                                <div class="mt-3 flex items-center justify-between">
                                    <span class="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded-full" x-text="trip.match_count + ' ' + t('applications')"></span>
                                    <span class="text-xs text-green-600 font-medium" x-text="t('open')"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div x-show="!homeTrips.length" class="text-center py-12 text-gray-400" x-text="t('no_trips')"></div>
                </div>
            </div>
        </template>

        <!-- ========== GIRIS ========== -->
        <template x-if="page === 'login'">
            <div class="max-w-md mx-auto py-16">
                <div class="bg-white p-8 rounded-2xl shadow-sm">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center" x-text="t('login_title')"></h2>

                    <!-- Google & Apple Butonlari -->
                    <div class="space-y-3 mb-6">
                        <button @click="showToast('Google hesabi yaklasimda...')" class="w-full py-3 border-2 border-gray-200 rounded-xl font-medium hover:bg-gray-50 flex items-center justify-center gap-3 text-gray-700">
                            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Google ile Giris Yap
                        </button>
                        <button @click="showToast('Apple hesabi yaklasimda...')" class="w-full py-3 bg-black text-white rounded-xl font-medium hover:bg-gray-900 flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                            Apple ile Giris Yap
                        </button>
                    </div>

                    <div class="flex items-center gap-3 mb-6">
                        <div class="flex-1 h-px bg-gray-200"></div>
                        <span class="text-sm text-gray-400">veya email ile</span>
                        <div class="flex-1 h-px bg-gray-200"></div>
                    </div>

                    <div class="space-y-4">
                        <input x-model="authForm.email" type="email" :placeholder="t('email')" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <input x-model="authForm.password" type="password" :placeholder="t('password_login')" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <p x-show="authError" class="text-red-500 text-sm" x-text="authError"></p>
                        <button @click="login()" class="w-full py-3 gradient-bg text-white rounded-xl font-bold hover:opacity-90" x-text="t('login')"></button>
                        <p class="text-center text-sm text-gray-500"><span x-text="t('no_account')"></span> <a @click="page='register'" class="text-purple-600 font-medium cursor-pointer" x-text="t('register')"></a></p>
                    </div>
                </div>
            </div>
        </template>

        <!-- ========== KAYIT ========== -->
        <template x-if="page === 'register'">
            <div class="max-w-md mx-auto py-16">
                <div class="bg-white p-8 rounded-2xl shadow-sm">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center" x-text="t('register_title')"></h2>

                    <!-- Google & Apple Butonlari -->
                    <div class="space-y-3 mb-6">
                        <button @click="showToast('Google hesabi yaklasimda...')" class="w-full py-3 border-2 border-gray-200 rounded-xl font-medium hover:bg-gray-50 flex items-center justify-center gap-3 text-gray-700">
                            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Google ile Kayit Ol
                        </button>
                        <button @click="showToast('Apple hesabi yaklasimda...')" class="w-full py-3 bg-black text-white rounded-xl font-medium hover:bg-gray-900 flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                            Apple ile Kayit Ol
                        </button>
                    </div>

                    <div class="flex items-center gap-3 mb-6">
                        <div class="flex-1 h-px bg-gray-200"></div>
                        <span class="text-sm text-gray-400">veya email ile</span>
                        <div class="flex-1 h-px bg-gray-200"></div>
                    </div>

                    <div class="space-y-4">
                        <input x-model="authForm.full_name" type="text" :placeholder="t('full_name')" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <input x-model="authForm.email" type="email" :placeholder="t('email')" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <input x-model="authForm.password" type="password" :placeholder="t('password')" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <select x-model="authForm.country" @change="authForm.city=''; autoLangFromCountry(authForm.country)" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none bg-white">
                            <option value="" x-text="t('select_country')"></option>
                            <template x-for="c in countries" :key="c">
                                <option :value="c" x-text="c"></option>
                            </template>
                        </select>
                        <select x-model="authForm.city" :disabled="!authForm.country" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none bg-white disabled:opacity-50">
                            <option value="" x-text="t('select_city')"></option>
                            <template x-for="c in getCities(authForm.country)" :key="c">
                                <option :value="c" x-text="c"></option>
                            </template>
                        </select>
                        <!-- Konustugu Diller -->
                        <div>
                            <label class="text-sm font-medium text-gray-600 block mb-2">Konustugum Diller</label>
                            <div class="flex flex-wrap gap-2">
                                <template x-for="lang in spokenLanguages" :key="lang">
                                    <button type="button" @click="toggleLang(authForm.languages, lang)"
                                        class="px-3 py-1.5 rounded-full text-xs border transition-all"
                                        :class="authForm.languages.includes(lang) ? 'bg-purple-600 text-white border-purple-600' : 'bg-white text-gray-600 border-gray-300 hover:border-purple-400'"
                                        x-text="lang"></button>
                                </template>
                            </div>
                            <p class="text-xs text-gray-400 mt-1" x-show="authForm.languages.length" x-text="authForm.languages.join(', ')"></p>
                        </div>
                        <p x-show="authError" class="text-red-500 text-sm" x-text="authError"></p>
                        <button @click="register()" class="w-full py-3 gradient-bg text-white rounded-xl font-bold hover:opacity-90" x-text="t('register')"></button>
                        <p class="text-center text-sm text-gray-500"><span x-text="t('has_account')"></span> <a @click="page='login'" class="text-purple-600 font-medium cursor-pointer" x-text="t('login')"></a></p>
                    </div>
                </div>
            </div>
        </template>

        <!-- ========== EMAIL DOGRULAMA ========== -->
        <template x-if="page === 'verify'">
            <div class="max-w-md mx-auto py-16">
                <div class="bg-white p-8 rounded-2xl shadow-sm text-center">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Email Dogrulama</h2>
                    <p class="text-gray-500 mb-2">Email adresinize gonderilen 6 haneli kodu girin</p>
                    <p class="text-sm text-gray-400 mb-6" x-text="verifyEmail"></p>

                    <!-- MVP: Kodu goster (prod'da kaldirilacak) -->
                    <div x-show="verifyHint" class="bg-yellow-50 border border-yellow-200 rounded-xl p-3 mb-4">
                        <p class="text-xs text-yellow-600 font-medium">Test Modu — Dogrulama Kodunuz:</p>
                        <p class="text-2xl font-bold text-yellow-700 tracking-widest" x-text="verifyHint"></p>
                    </div>

                    <input x-model="verifyCode" type="text" maxlength="6" placeholder="_ _ _ _ _ _"
                        class="w-full px-4 py-4 border-2 rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none text-center text-2xl tracking-widest font-bold mb-4">

                    <p x-show="verifyError" class="text-red-500 text-sm mb-3" x-text="verifyError"></p>

                    <button @click="verifyAccount()" class="w-full py-3 gradient-bg text-white rounded-xl font-bold hover:opacity-90 mb-3">Dogrula</button>

                    <button @click="resendCode()" class="text-sm text-purple-600 hover:underline">Kodu tekrar gonder</button>
                </div>

                                        </button>
                                    </template>
                                </div>
                            </div>

                            <!-- Diger Diller -->
                            <div>
                                <p class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Diger Diller</p>
                                <div class="grid grid-cols-2 gap-2">
                                    <template x-for="(data, code) in digerDiller" :key="code">
                                        <button @click="setLang(code)" class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm border transition-all"
                                            :class="lang === code ? 'border-purple-500 bg-purple-50 text-purple-700 font-bold' : 'border-gray-200 hover:border-purple-300 text-gray-600'">
                                            <span x-text="data.flag"></span>
                                            <span x-text="data.name"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <button @click="updateProfile()" class="w-full py-3 gradient-bg text-white rounded-xl font-bold hover:opacity-90" x-text="t('save')"></button>
                    </div>
                </div>
            </div>
        </template>

    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/places.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
